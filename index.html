<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Portail des Jeux Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Lexend:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
/* ═══════════════════════════════════════════════
   STYLES DU PORTAIL GLOBAL (DARK / LIGHT THEME)
   ═══════════════════════════════════════════════ */
:root {
    --bg-main: #111; --bg-screen: linear-gradient(135deg, #1e1e2f, #000);
    --panel-bg: #1e293b; --panel-border: #334155;
    --text-main: #fff; --text-muted: #94a3b8;
    --input-bg: #0f172a; --input-border: #475569;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --btn-text: #fff;
    --btn-sec-bg: #475569; --btn-sec-shadow: #334155; --btn-sec-text: #ffffff;
}

body.light-mode {
    --bg-main: #f8fafc; --bg-screen: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    --panel-bg: #ffffff; --panel-border: #cbd5e1;
    --text-main: #0f172a; --text-muted: #64748b;
    --input-bg: #f8fafc; --input-border: #94a3b8;
    --accent: #0ea5e9; --accent-hover: #0284c7;
    --btn-text: #fff;
    --btn-sec-bg: #e2e8f0; --btn-sec-shadow: #cbd5e1; --btn-sec-text: #0f172a;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg-main); color: var(--text-main); font-family: 'Lexend', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s; }

/* Conteneurs Principaux : Grosse marge en bas pour ne pas cacher le dernier jeu */
.screen-container { display: none; height: 100vh; width: 100%; position: relative; overflow-y: auto; background: var(--bg-screen); padding-bottom: 120px;}
.screen-container.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 20px;}

/* Écran Login */
#login-container { height: 100vh; justify-content: center; padding-bottom: 20px; }
#login-box { background: var(--panel-bg); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--panel-border); width: 90%; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
.portal-title { font-family: 'Bungee', sans-serif; font-size: 2.5rem; text-align: center; margin-bottom: 10px; color: var(--text-main); }
.portal-subtitle { font-family: 'Bungee', sans-serif; font-size: 1.5rem; text-align: center; margin-bottom: 15px; color: var(--accent); }

.portal-input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border-radius: 10px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: 'Lexend'; font-size: 1rem; text-align: center; transition: 0.2s;}
.portal-input:focus { border-color: var(--accent); outline: none; }
.portal-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-family: 'Bungee'; font-size: 0.9rem; cursor: pointer; transition: 0.2s; color: var(--btn-text); margin-bottom:10px; display:flex; justify-content:center; align-items:center; gap:10px;}
.portal-btn:active { transform: translateY(2px); }

.btn-admin { background: var(--accent); box-shadow: 0 4px 0 var(--accent-hover); color: white !important;}
.btn-guest { background: #10b981; box-shadow: 0 4px 0 #047857; margin-top: 10px; color: white !important;}
.btn-google { background: #ea4335; box-shadow: 0 4px 0 #b91c1c; color: white !important;}
.btn-add { background: #f59e0b; box-shadow: 0 4px 0 #b45309; max-width: 300px; margin-bottom: 20px; color: white !important;}
.btn-cancel { background: #ef4444; box-shadow: 0 4px 0 #b91c1c; color: white !important;}
.btn-secondary { background: var(--btn-sec-bg) !important; color: var(--btn-sec-text) !important; box-shadow: 0 4px 0 var(--btn-sec-shadow) !important; }

/* Filtres */
.filters-bar { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; max-width: 800px; padding: 15px; background: var(--panel-bg); border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--panel-border);}
.filter-input { flex: 1; min-width: 150px; padding: 8px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-main); font-family: 'Lexend'; font-size:0.9rem;}

/* Cartes (Jeux/Quiz) */
.items-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; padding: 10px;}
.item-card { background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 15px; width: 280px; padding: 25px 20px; text-align: center; transition: transform 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative; margin-top: 15px;}
.item-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
.item-title { font-family: 'Bungee', sans-serif; font-size: 1.4rem; margin-bottom: 5px; display:flex; justify-content:center; align-items:center; gap:8px;}
.item-tags { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; font-style: italic;}
.item-players { font-size: 0.8rem; color: var(--text-main); font-weight:bold; margin-bottom: 10px; background:var(--input-bg); padding:4px; border-radius:4px; border:1px solid var(--panel-border);}
.item-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.4;}
.play-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; color: white; font-family: 'Bungee'; box-shadow: 0 4px 0 rgba(0,0,0,0.5); transition:0.2s;}
.play-btn:active { transform: translateY(2px); box-shadow: 0 0 0 transparent;}
/* Boutons Flottants sur Carte */
.info-btn { position: absolute; top: -15px; left: -15px; background: #1e293b; border: 2px solid #fff; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 10; font-family: 'Bungee'; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
.info-btn:hover { transform: scale(1.1); background: #334155;}

.delete-btn { position: absolute; top: -10px; right: -10px; background: #ef4444; border: 2px solid #fff; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
.delete-btn:hover { background: #dc2626; transform: scale(1.1); }

.edit-btn { position: absolute; top: -10px; right: 35px; background: #3b82f6; border: 2px solid #fff; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
.edit-btn:hover { background: #2563eb; transform: scale(1.1); }

.fav-icon { cursor: pointer; font-size: 1.2rem; opacity: 0.3; transition: 0.2s; filter: grayscale(100%);}
.fav-icon.active { opacity: 1; filter: grayscale(0%); text-shadow: 0 0 5px #ef4444;}
.fav-icon:hover { transform: scale(1.2); }

/* Navigation Bottom Bar */
.bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--input-bg); border-top: 2px solid var(--panel-border); display: none; z-index: 100;}
.bottom-nav.active { display: flex; }
.nav-btn { flex: 1; border: none; background: transparent; color: var(--text-muted); font-family: 'Bungee'; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-direction:column;}
.nav-btn span { font-size:0.6rem; font-family:'Lexend';}
.nav-btn.active { color: var(--accent); background: var(--panel-bg); border-top: 3px solid var(--accent);}

/* Tchat Global */
.chat-box { width: 100%; max-width: 600px; height: 60vh; background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; margin-bottom:15px;}
.chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { background: var(--input-bg); padding: 10px; border-radius: 10px; border: 1px solid var(--input-border); width: fit-content; max-width: 80%; text-align: left; }
.chat-msg.me { align-self: flex-end; background: var(--accent); color: white; border-color: var(--accent-hover); }
.chat-header { font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; display:flex; justify-content:space-between; gap:10px;}
.chat-input-area { display: flex; border-top: 2px solid var(--panel-border); }
.chat-input-area input { flex: 1; border: none; padding: 15px; background: var(--input-bg); color: var(--text-main); outline: none; font-family:'Lexend';}
.chat-input-area button { background: var(--accent); border: none; color: white; padding: 0 20px; cursor: pointer; font-family: 'Bungee'; }

/* Profil & Admin */
.profile-card { background: var(--panel-bg); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; border: 2px solid var(--panel-border); text-align: center; margin-bottom: 20px;}
.avatar-select { font-size: 3rem; cursor: pointer; margin-bottom: 10px; display:inline-block; border: 2px dashed transparent; padding:10px; border-radius:50%; transition:0.2s;}
.avatar-select:hover { border-color: var(--accent); }
.status-dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#10b981; margin-left:5px;}

/* Lecteur de Jeu */
#game-player-container { display: none; position: fixed; inset: 0; background: var(--bg-main); z-index: 500; }
#game-iframe { width: 100%; height: 100%; border: none; background: transparent;}
#global-home-btn { position: fixed; top: 15px; left: 15px; width: 50px; height: 50px; border-radius: 50%; background: #ef4444; border: 2px solid #fff; color: white; font-size: 1.5rem; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; font-family: 'Bungee'; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;}
#global-rules-btn { position: fixed; top: 15px; right: 15px; width: 50px; height: 50px; border-radius: 50%; background: var(--panel-bg); border: 2px solid var(--accent); color: var(--accent); font-size: 1.5rem; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; font-family: 'Bungee'; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;}

/* Modales */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(3px);}
.rules-box { background: var(--panel-bg); padding: 30px; border-radius: 12px; max-width: 500px; width: 100%; text-align: left; border: 2px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.8); color: var(--text-main); max-height: 85vh; overflow-y: auto;}
#qrcode { background:white; padding:10px; border-radius:10px; margin:15px auto; display:inline-block;}

/* Formulaire Ajout */
#add-box { background: var(--panel-bg); padding: 20px; border-radius: 15px; width: 100%; max-width: 600px; border: 2px solid var(--panel-border); }
.form-row { display: flex; gap: 10px; }
textarea.portal-input { height: 120px; text-align: left; resize: vertical; font-family: 'Lexend'; font-size: 0.9rem;}
textarea.portal-code { font-family: monospace; font-size: 0.8rem; }
.color-picker-wrap { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0 20px 0; }
input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; background: none; }
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
input[type="color"]::-webkit-color-swatch { border: 2px solid #fff; border-radius: 50%; }
</style>
</head>
<body>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(!portalState.settings.sound) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'click') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
    if(type === 'success') { osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
}
</script>

<button id="global-home-btn" onclick="closeGame()">✖</button>
<button id="global-rules-btn" onclick="showGlobalRules()">i</button>

<div class="screen-container active" id="login-container">
    <div id="login-box">
        <h1 class="portal-title">LE PORTAIL</h1>
        <p style="margin-bottom: 20px; color: var(--text-muted); font-size:0.9rem;">Connexion à la plateforme</p>
        <button class="portal-btn btn-google" onclick="loginGoogle()">S'IDENTIFIER AVEC GOOGLE</button>
        <div style="margin: 25px 0; border-top: 1px solid var(--panel-border);"></div>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom:10px;">Accès rapide ou invité :</p>
        <button class="portal-btn btn-guest" style="margin-bottom:20px;" onclick="loginAsGuest()">ENTRER COMME INVITÉ</button>
        <div style="border-top: 1px dashed var(--panel-border); padding-top: 15px;">
            <input type="text" id="login-user" class="portal-input" placeholder="Identifiant (Admin Local)">
            <input type="password" id="login-pass" class="portal-input" placeholder="Mot de passe">
            <button class="portal-btn btn-admin" onclick="tryLocalLogin()">CONNEXION LOCALE</button>
        </div>
    </div>
</div>

<div class="screen-container" id="games-container">
    <h2 class="portal-subtitle">🕹️ LES JEUX</h2>
    <div class="filters-bar">
        <input type="text" id="search-games" class="filter-input" placeholder="Rechercher par nom ou tag..." onkeyup="renderGrid('games')">
        <select id="sort-games" class="filter-input" onchange="renderGrid('games')">
            <option value="date-desc">Récent d'abord</option><option value="fav">Mes Favoris ❤️</option>
            <option value="name-asc">Nom (A-Z)</option><option value="name-desc">Nom (Z-A)</option>
        </select>
        <select id="filter-players-games" class="filter-input" onchange="renderGrid('games')">
            <option value="all">Nb Joueurs : Tous</option>
            <option value="4">4 Joueurs</option><option value="6">6 Joueurs</option><option value="8">8+ Joueurs</option>
        </select>
    </div>
    <button id="btn-add-game" class="portal-btn btn-add" style="display: none;" onclick="showAddScreen('games')">+ AJOUTER UN JEU</button>
    <div class="items-grid" id="games-grid"></div>
</div>

<div class="screen-container" id="quiz-container">
    <h2 class="portal-subtitle" style="color:#10b981;">🧠 LES QUIZ</h2>
    <div class="filters-bar">
        <input type="text" id="search-quiz" class="filter-input" placeholder="Rechercher par nom ou tag..." onkeyup="renderGrid('quiz')">
        <select id="sort-quiz" class="filter-input" onchange="renderGrid('quiz')"><option value="date-desc">Récent d'abord</option><option value="fav">Mes Favoris ❤️</option><option value="name-asc">Nom (A-Z)</option></select>
        <select id="filter-players-quiz" class="filter-input" onchange="renderGrid('quiz')"><option value="all">Nb Joueurs : Tous</option><option value="2">2 Joueurs</option><option value="4">4 Joueurs</option></select>
    </div>
    <button id="btn-add-quiz" class="portal-btn btn-add" style="display: none; background:#10b981; box-shadow:0 4px 0 #047857;" onclick="showAddScreen('quiz')">+ AJOUTER UN QUIZ</button>
    <div class="items-grid" id="quiz-grid"></div>
</div>

<div class="screen-container" id="chat-container">
    <h2 class="portal-subtitle" style="color:#f59e0b;">💬 TCHAT GLOBAL</h2>
    <div class="chat-box">
        <div class="chat-messages" id="global-chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Écrire un message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()">ENVOYER</button>
        </div>
    </div>
</div>

<div class="screen-container" id="profile-container">
    <h2 class="portal-subtitle" style="color:#ec4899;">👤 MON PROFIL</h2>
    <div class="profile-card">
        <div class="avatar-select" id="prof-avatar" onclick="changeAvatar()">👽</div>
        <h3 id="prof-name" style="font-family:'Bungee'; margin-bottom:5px; font-size:1.5rem;">Joueur</h3>
        <button class="portal-btn btn-secondary" style="margin: 10px auto 20px auto; padding: 8px; width:auto; font-size:0.8rem;" onclick="editProfileName()">✏️ CHANGER DE NOM</button>
        <div style="text-align:left; font-size:0.9rem; color:var(--text-muted); margin-bottom:20px; line-height:1.5;">
            Statut : <span class="status-dot"></span> En ligne<br>
            Rôle : <b id="prof-role">Joueur</b><br>
            Jeux joués : <b id="prof-stat-played">0</b>
        </div>
        <div style="border-top:1px dashed var(--panel-border); padding-top:15px; display:flex; flex-direction:column; gap:10px;">
            <button class="portal-btn btn-secondary" onclick="toggleTheme()">🌓 MODE SOMBRE / CLAIR</button>
            <button class="portal-btn btn-secondary" onclick="toggleSound()">🔊 ACTIVER/DÉSACTIVER LE SON</button>
        </div>
    </div>
    <div id="admin-tools" style="display:none; width:100%; max-width:400px;">
        <h3 style="margin-bottom:10px; color:#ef4444; font-family:'Bungee'; text-align:center;">🛠️ OUTILS ADMIN</h3>
        <button class="portal-btn btn-cancel" onclick="exportData()">💾 EXPORTER LA BDD (JSON)</button>
    </div>
    <button class="portal-btn btn-cancel" style="max-width: 200px; margin-top: 30px;" onclick="logout()">DÉCONNEXION</button>
</div>
<div class="screen-container" id="add-item-container">
    <h1 class="portal-title" id="add-title-main">NOUVEL AJOUT</h1>
    <div id="add-box">
        <label>Titre</label><input type="text" id="add-title" class="portal-input" placeholder="Ex: Spyfall">
        <label>Description courte</label><input type="text" id="add-desc" class="portal-input" placeholder="Ex: Trouvez l'espion.">
        <label>Tags (séparés par virgule)</label><input type="text" id="add-tags" class="portal-input" placeholder="Ex: Bluff, Cartes, Rapide">
        <div class="form-row">
            <div style="flex:1;"><label>Min Joueurs</label><input type="number" id="add-min-p" class="portal-input" value="3" min="1"></div>
            <div style="flex:1;"><label>Max Joueurs</label><input type="number" id="add-max-p" class="portal-input" value="8" min="2"></div>
        </div>
        <label>Règles du jeu</label><textarea id="add-rules" class="portal-input" placeholder="Ex: But du jeu..."></textarea>
        <label>Couleur du thème</label>
        <div class="color-picker-wrap">
            <input type="color" id="add-color" value="#3b82f6"><span id="color-hex-display" style="font-family: monospace;">#3b82f6</span>
        </div>
        <div style="margin: 20px 0; border-top: 1px dashed var(--panel-border);"></div>
        <label>Importer le fichier HTML</label><input type="file" id="add-file" accept=".html" class="portal-input" onchange="handleFileUpload(event)">
        <label>OU modifiez le code manuellement :</label><textarea id="add-code" class="portal-input portal-code" placeholder="Le code apparaîtra ici..."></textarea>
        <button class="portal-btn btn-admin" style="margin-top:20px;" onclick="saveNewItem()">ENREGISTRER</button>
        <button class="portal-btn btn-cancel" onclick="cancelAdd()">ANNULER</button>
    </div>
</div>

<div id="game-player-container">
    <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

</div>

<div id="play-modal" class="modal-overlay">
    <div class="rules-box" style="text-align:center;">
        <h2 style="font-family:'Bungee'; margin-bottom:15px; color:var(--accent);">REJOINDRE LA PARTIE</h2>
        <div id="qrcode"></div>
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:20px;">Scannez pour rejoindre via le portail !</p>
        <button class="portal-btn btn-admin" onclick="confirmLaunch(false)">🎮 JOUER</button>

</div>

<div class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" id="nav-games" onclick="switchTab('games')">🎮<br><span>JEUX</span></button>
    <button class="nav-btn" id="nav-quiz" onclick="switchTab('quiz')">🧠<br><span>QUIZ</span></button>
    <button class="nav-btn" id="nav-chat" onclick="switchTab('chat')">💬<br><span>TCHAT</span></button>
    <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')">👤<br><span>PROFIL</span></button>
</div>

<textarea id="default-undercover-code" style="display:none;">
<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Undercover</title><style>body{background:#111;color:#fff;font-family:sans-serif;text-align:center;padding:50px;}h1{color:#3b82f6;}</style></head><body><h1>UNDERCOVER</h1><p>Insérez votre code de jeu ici via l'éditeur du portail !</p></body></html>
</textarea>

<script>
if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('fetch', function(e){});`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

const firebaseConfig = {
  apiKey: "AIzaSyBEiKDARJMM8VPbFrLJBzEC7c2paw2HGUQ",
  authDomain: "timebomb3-572e0.firebaseapp.com",
  databaseURL: "https://timebomb3-572e0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "timebomb3-572e0",
  storageBucket: "timebomb3-572e0.firebasestorage.app",
  messagingSenderId: "57545585120",
  appId: "1:57545585120:web:a13c7c67f4da27f0fefb85"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();
const auth = firebase.auth();

let portalState = { 
    currentUser: null, role: 'guest', 
    games: [], quiz: [], 
    currentTab: 'games', addingType: 'games', editingItemId: null,
    pendingLaunchId: null, pendingLaunchType: null,
    settings: { theme: 'dark', sound: true, favs: {} }
};

let savedFavs = localStorage.getItem('portal_favs');
if(savedFavs) portalState.settings.favs = JSON.parse(savedFavs);
let savedTheme = localStorage.getItem('portal_theme');
if(savedTheme === 'light') toggleTheme(); 

const defaultUndercoverGame = { 
    id: 'game_undercover', title: 'UNDERCOVER', tags: 'Bluff, Mots, Traître',
    desc: "Trouvez l'intrus parmi vous en débattant sur un mot secret.", 
    rules: "Le but du jeu est de trouver l'intrus...",
    color: '#3b82f6', minP: 3, maxP: 10, timestamp: Date.now(),
    code: document.getElementById('default-undercover-code').value 
};

window.onload = () => { 
    switchScreen('login-container'); 
    
    db.ref('portal_games_list').on('value', (snap) => {
        portalState.games = snap.exists() ? snap.val() : [defaultUndercoverGame];
        if(portalState.currentTab === 'games') renderGrid('games');
    });

    db.ref('portal_quiz_list').on('value', (snap) => {
        portalState.quiz = snap.exists() ? snap.val() : [];
        if(portalState.currentTab === 'quiz') renderGrid('quiz');
    });

    db.ref('global_chat').limitToLast(50).on('child_added', (snap) => {
        let msg = snap.val();
        let box = document.getElementById('global-chat-messages');
        let isMe = (portalState.currentUser && msg.uid === portalState.currentUser.uid);
        let el = document.createElement('div');
        el.className = `chat-msg ${isMe ? 'me' : ''}`;
        el.innerHTML = `<div class="chat-header"><span>${msg.avatar} ${msg.name}</span> <span style="opacity:0.6;">${new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div><div>${msg.text}</div>`;
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            let isAdmin = (user.email === "nassim57132@gmail.com"); 
            let userRole = isAdmin ? 'admin' : 'guest';
            let userAvatar = isAdmin ? '👑' : '👽';
            let userName = isAdmin ? 'Nassim (Admin)' : (user.displayName || 'Joueur');
            setupUserSession({ uid: user.uid, name: userName, avatar: userAvatar, role: userRole });
        }
    });
};

function loginGoogle() {
    playSound('click');
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => { alert("Erreur Google Auth: " + err.message); });
}
function tryLocalLogin() {
    playSound('click');
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if(u === 'nassim' && p === 'nassim') { setupUserSession({ uid: 'admin_1', name: 'Nassim (Admin)', avatar: '👑', role: 'admin' }); } 
    else { alert("Identifiant ou mot de passe incorrect !"); }
}

function loginAsGuest() { 
    playSound('click');
    const adjs = ['Mystérieux', 'Rapide', 'Furtif', 'Malin', 'Sauvage', 'Céleste', 'Épique', 'Délirant'];
    const nouns = ['Panda', 'Renard', 'Ninja', 'Fantôme', 'Tigre', 'Loup', 'Dragon', 'Chat'];
    const randomName = nouns[Math.floor(Math.random()*nouns.length)] + ' ' + adjs[Math.floor(Math.random()*adjs.length)];
    setupUserSession({ uid: 'guest_' + Math.random().toString(36).substr(2,9), name: randomName, avatar: '👻', role: 'guest' }); 
}

function setupUserSession(userData) {
    playSound('success');
    portalState.currentUser = userData; portalState.role = userData.role;
    
    localStorage.setItem('portal_uid', userData.uid); localStorage.setItem('portal_name', userData.name);
    
    document.getElementById('prof-name').innerText = userData.name;
    document.getElementById('prof-avatar').innerText = userData.avatar;
    document.getElementById('prof-role').innerText = userData.role === 'admin' ? 'Administrateur' : 'Joueur';
    document.getElementById('admin-tools').style.display = userData.role === 'admin' ? 'block' : 'none';
    
    let userRef = db.ref('portal_users/' + userData.uid);
    userRef.update({ name: userData.name, avatar: userData.avatar, online: true });
    userRef.onDisconnect().update({ online: false });
    
    document.getElementById('bottom-nav').classList.add('active');
    switchTab('games');
}

function editProfileName() {
    playSound('click');
    let newName = prompt("Entrez votre nouveau nom :", portalState.currentUser.name);
    if (newName && newName.trim() !== "") {
        newName = newName.trim(); portalState.currentUser.name = newName;
        document.getElementById('prof-name').innerText = newName;
        localStorage.setItem('portal_name', newName);
        db.ref('portal_users/' + portalState.currentUser.uid).update({ name: newName });
    }
}

function logout() { 
    playSound('click');
    if(portalState.currentUser) db.ref('portal_users/' + portalState.currentUser.uid).update({ online: false });
    auth.signOut(); portalState.currentUser = null; portalState.role = 'guest';
    document.getElementById('login-user').value = ''; document.getElementById('login-pass').value = ''; 
    document.getElementById('bottom-nav').classList.remove('active');
    switchScreen('login-container'); 
}

function switchScreen(id) { document.querySelectorAll('.screen-container').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function switchTab(tab) {
    playSound('click'); portalState.currentTab = tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    switchScreen(tab + '-container');
    if(tab === 'games') { document.getElementById('btn-add-game').style.display = portalState.role === 'admin' ? 'block' : 'none'; renderGrid('games'); } 
    else if (tab === 'quiz') { document.getElementById('btn-add-quiz').style.display = portalState.role === 'admin' ? 'block' : 'none'; renderGrid('quiz'); }
}

function toggleTheme() {
    playSound('click'); document.body.classList.toggle('light-mode');
    portalState.settings.theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
    localStorage.setItem('portal_theme', portalState.settings.theme);
}

function toggleSound() { portalState.settings.sound = !portalState.settings.sound; playSound('click'); alert(portalState.settings.sound ? "Son activé" : "Son désactivé"); }

function changeAvatar() {
    const emojis = ['👽','👻','🤖','🤡','🤠','😈','🦊','🐼','🦄','🦖'];
    const current = document.getElementById('prof-avatar').innerText;
    let nextIdx = (emojis.indexOf(current) + 1) % emojis.length;
    let newAvatar = emojis[nextIdx];
    document.getElementById('prof-avatar').innerText = newAvatar;
    if(portalState.currentUser) { portalState.currentUser.avatar = newAvatar; db.ref('portal_users/' + portalState.currentUser.uid).update({ avatar: newAvatar }); }
}

function renderGrid(type) {
    let list = type === 'games' ? [...portalState.games] : [...portalState.quiz];
    const grid = document.getElementById(type + '-grid'); grid.innerHTML = '';
    let searchVal = document.getElementById('search-' + type).value.trim().toLowerCase();
    let sortVal = document.getElementById('sort-' + type).value;
    let filterP = document.getElementById('filter-players-' + type).value;

    list = list.filter(item => {
        let textMatch = item.title.toLowerCase().includes(searchVal) || item.desc.toLowerCase().includes(searchVal) || (item.tags && item.tags.toLowerCase().includes(searchVal));
        let matchFav = sortVal === 'fav' ? portalState.settings.favs[item.id] : true;
        let matchPlayers = true;
        if(filterP !== 'all') { let pNum = parseInt(filterP); let min = item.minP || 1; let max = item.maxP || 99; matchPlayers = (pNum >= min && pNum <= max); }
        return textMatch && matchFav && matchPlayers;
    });

    list.sort((a, b) => {
        let tA = a.timestamp || 0; let tB = b.timestamp || 0;
        let nA = a.title.toLowerCase(); let nB = b.title.toLowerCase();
        if(sortVal === 'date-desc' || sortVal === 'fav') return tB - tA;
        if(sortVal === 'name-asc') return nA.localeCompare(nB);
        if(sortVal === 'name-desc') return nB.localeCompare(nA);
        return 0;
    });
    
    list.forEach(item => {
        let card = document.createElement('div'); card.className = 'item-card'; card.style.borderColor = item.color;
        let isFav = portalState.settings.favs[item.id];
        let favHtml = `<span class="fav-icon ${isFav?'active':''}" onclick="toggleFav('${item.id}', event)">❤️</span>`;
        let infoBtnHtml = `<button class="info-btn" onclick="openRulesFromHub('${item.id}', '${type}', event)">i</button>`;
        let editBtnHtml = portalState.role === 'admin' ? `<button class="edit-btn" onclick="editItem('${item.id}', '${type}', event)">✏️</button>` : '';
        let deleteBtnHtml = portalState.role === 'admin' ? `<button class="delete-btn" onclick="deleteItem('${item.id}', '${type}', event)">✖</button>` : '';
        let playersHtml = (item.minP && item.maxP) ? `<div class="item-players">👥 ${item.minP} à ${item.maxP} Joueurs</div>` : '';
        let tagsHtml = item.tags ? `<div class="item-tags">${item.tags}</div>` : '';
        
        card.innerHTML = `
            ${infoBtnHtml} ${editBtnHtml} ${deleteBtnHtml}
            <div>
                <div class="item-title" style="color: ${item.color};">${item.title} ${favHtml}</div>
                ${tagsHtml} ${playersHtml} <div class="item-desc">${item.desc}</div>
            </div>
            <button class="play-btn" style="background: ${item.color};" onclick="prepLaunch('${item.id}', '${type}')">JOUER</button>
        `;
        grid.appendChild(card);
    });
}

function toggleFav(id, event) {
    playSound('click'); event.stopPropagation();
    if(portalState.settings.favs[id]) delete portalState.settings.favs[id]; else portalState.settings.favs[id] = true;
    localStorage.setItem('portal_favs', JSON.stringify(portalState.settings.favs)); renderGrid(portalState.currentTab);
}

function deleteItem(itemId, type, event) {
    event.stopPropagation(); playSound('click');
    if(confirm(`Êtes-vous sûr de vouloir supprimer cet élément ?`)) {
        if(type === 'games') { portalState.games = portalState.games.filter(g => g.id !== itemId); db.ref('portal_games_list').set(portalState.games); } 
        else { portalState.quiz = portalState.quiz.filter(q => q.id !== itemId); db.ref('portal_quiz_list').set(portalState.quiz); }
    }
}

function editItem(itemId, type, event) {
    event.stopPropagation(); playSound('click');
    portalState.addingType = type; portalState.editingItemId = itemId;
    let list = type === 'games' ? portalState.games : portalState.quiz;
    let item = list.find(x => x.id === itemId); if(!item) return;

    document.getElementById('add-title-main').innerText = "MODIFIER " + (type === 'games' ? "LE JEU" : "LE QUIZ");
    document.getElementById('add-title').value = item.title; document.getElementById('add-desc').value = item.desc;
    document.getElementById('add-tags').value = item.tags || ''; document.getElementById('add-min-p').value = item.minP || 1;
    document.getElementById('add-max-p').value = item.maxP || 99; document.getElementById('add-rules').value = item.rules || '';
    document.getElementById('add-color').value = item.color; document.getElementById('color-hex-display').innerText = item.color;
    document.getElementById('add-code').value = item.code; document.getElementById('add-file').value = '';
    
    document.getElementById('bottom-nav').style.display = 'none'; switchScreen('add-item-container');
}

function showAddScreen(type) {
    playSound('click'); portalState.addingType = type; portalState.editingItemId = null;
    document.getElementById('add-title-main').innerText = type === 'games' ? "NOUVEAU JEU" : "NOUVEAU QUIZ";
    document.getElementById('add-title').value = ''; document.getElementById('add-desc').value = ''; document.getElementById('add-tags').value = '';
    document.getElementById('add-rules').value = ''; document.getElementById('add-min-p').value = '2'; document.getElementById('add-max-p').value = '8';
    let defaultColor = type === 'games' ? '#3b82f6' : '#10b981';
    document.getElementById('add-color').value = defaultColor; document.getElementById('color-hex-display').innerText = defaultColor;
    document.getElementById('add-code').value = ''; document.getElementById('add-file').value = '';
    document.getElementById('bottom-nav').style.display = 'none'; switchScreen('add-item-container');
}

function cancelAdd() { playSound('click'); document.getElementById('bottom-nav').style.display = 'flex'; switchTab(portalState.addingType); }

function handleFileUpload(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) { document.getElementById('add-code').value = e.target.result; };
    reader.onerror = function() { alert("Erreur de lecture."); }; reader.readAsText(file);
}

function saveNewItem() {
    playSound('success');
    const title = document.getElementById('add-title').value.trim(); const desc = document.getElementById('add-desc').value.trim();
    const tags = document.getElementById('add-tags').value.trim(); const rules = document.getElementById('add-rules').value.trim();
    const minP = parseInt(document.getElementById('add-min-p').value); const maxP = parseInt(document.getElementById('add-max-p').value);
    const color = document.getElementById('add-color').value.trim(); const code = document.getElementById('add-code').value.trim();
    if(!title || !code) return alert("Titre et code obligatoires.");

    let newItem = { id: portalState.editingItemId || (portalState.addingType + '_' + Math.random().toString(36).substr(2, 9)), title: title, desc: desc, tags: tags, rules: rules, minP: minP || 1, maxP: maxP || 99, color: color, code: code };
    let list = portalState.addingType === 'games' ? portalState.games : portalState.quiz;
    
    if(portalState.editingItemId) { let idx = list.findIndex(x => x.id === portalState.editingItemId); if(idx > -1) { newItem.timestamp = list[idx].timestamp; list[idx] = newItem; } } 
    else { newItem.timestamp = Date.now(); list.push(newItem); }
    
    if(portalState.addingType === 'games') db.ref('portal_games_list').set(list); else db.ref('portal_quiz_list').set(list);
    alert("Enregistré avec succès !"); document.getElementById('bottom-nav').style.display = 'flex'; switchTab(portalState.addingType);
}

function exportData() {
    playSound('click');
    const data = { games: portalState.games, quiz: portalState.quiz };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'portail_backup.json'; a.click();
}

function prepLaunch(itemId, type) {
    playSound('click'); portalState.pendingLaunchId = itemId; portalState.pendingLaunchType = type;
    document.getElementById('qrcode').innerHTML = '';
    let currentUrl = window.location.href.split('?')[0];
    new QRCode(document.getElementById("qrcode"), { text: currentUrl, width: 128, height: 128, colorDark: "#000000", colorLight: "#ffffff" });
    document.getElementById('play-modal').style.display = 'flex';
}

function confirmLaunch(isSpectator) {
    playSound('success'); document.getElementById('play-modal').style.display = 'none';
    localStorage.setItem('portal_player_role', isSpectator ? 'spectator' : 'player');
    let list = portalState.pendingLaunchType === 'games' ? portalState.games : portalState.quiz;
    const item = list.find(x => x.id === portalState.pendingLaunchId); if(!item) return;
    
    if(portalState.currentUser && !isSpectator) {
        let statRef = db.ref('portal_users/' + portalState.currentUser.uid + '/played');
        statRef.transaction(current => (current || 0) + 1);
        document.getElementById('prof-stat-played').innerText = parseInt(document.getElementById('prof-stat-played').innerText) + 1;
    }
    
    document.querySelectorAll('.screen-container').forEach(s => s.classList.remove('active'));
    document.getElementById('bottom-nav').style.display = 'none';
    
    let btnRules = document.getElementById('global-rules-btn');
    let rulesContent = item.rules ? item.rules.replace(/\n/g, '<br>') : "Aucune règle n'a été renseignée.";
    document.getElementById('global-rules-title').innerText = item.title; document.getElementById('global-rules-title').style.color = item.color;
    document.getElementById('global-rules-box').style.borderColor = item.color; document.getElementById('global-rules-content').innerHTML = rulesContent;
    btnRules.style.borderColor = item.color; btnRules.style.color = item.color; btnRules.style.display = 'flex';
    
    document.getElementById('game-player-container').style.display = 'block';
    document.getElementById('global-home-btn').style.display = 'flex';
    document.getElementById('game-iframe').srcdoc = item.code;
}

function openRulesFromHub(itemId, type, event) {
    event.stopPropagation(); playSound('click');
    let list = type === 'games' ? portalState.games : portalState.quiz;
    const item = list.find(x => x.id === itemId); if(!item) return;
    let rulesContent = item.rules ? item.rules.replace(/\n/g, '<br>') : "Aucune règle n'a été renseignée.";
    document.getElementById('global-rules-title').innerText = item.title; document.getElementById('global-rules-title').style.color = item.color;
    document.getElementById('global-rules-box').style.borderColor = item.color; document.getElementById('global-rules-content').innerHTML = rulesContent;
    document.getElementById('global-rules-modal').style.display = 'flex';
}

function showGlobalRules() { playSound('click'); document.getElementById('global-rules-modal').style.display = 'flex'; }
function hideGlobalRules() { playSound('click'); document.getElementById('global-rules-modal').style.display = 'none'; }

function closeGame() {
    playSound('click');
    if(confirm("Quitter l'activité et retourner au portail ?")) {
        document.getElementById('game-player-container').style.display = 'none';
        document.getElementById('global-home-btn').style.display = 'none';
        document.getElementById('global-rules-btn').style.display = 'none';
        hideGlobalRules(); document.getElementById('game-iframe').srcdoc = '';
        document.getElementById('bottom-nav').style.display = 'flex'; switchTab(portalState.currentTab);
    }
}

function sendChatMessage() {
    let input = document.getElementById('chat-input'); let text = input.value.trim();
    if(!text || !portalState.currentUser) return;
    playSound('click');
    db.ref('global_chat').push({ uid: portalState.currentUser.uid, name: portalState.currentUser.name, avatar: portalState.currentUser.avatar, text: text, time: Date.now() });
    input.value = '';
}
</script>
</body>
