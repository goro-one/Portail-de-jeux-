<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Portail des Jeux Dynamique</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Lexend:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: #111; color: #fff; font-family: 'Lexend', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.screen-container { display: none; height: 100vh; width: 100%; position: relative; overflow-y: auto; background: linear-gradient(135deg, #1e1e2f, #000); }
.screen-container.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px;}

#login-box { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #334155; width: 100%; max-width: 400px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
.portal-title { font-family: 'Bungee', sans-serif; font-size: 2.5rem; text-align: center; margin-bottom: 20px; color: #f8fafc; }
.portal-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 2px solid #475569; background: #0f172a; color: white; font-family: 'Lexend'; font-size: 1.1rem; text-align: center;}
.portal-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-family: 'Bungee'; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 10px; color: white; }
.portal-btn:active { transform: translateY(2px); }
.btn-admin { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
.btn-guest { background: #10b981; box-shadow: 0 4px 0 #047857; margin-top: 30px; }
.btn-add { background: #f59e0b; box-shadow: 0 4px 0 #b45309; max-width: 300px; margin-bottom: 30px; }
.btn-cancel { background: #ef4444; box-shadow: 0 4px 0 #b91c1c; }

.game-selector { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; padding-bottom: 50px;}
.game-card { background: #222; border: 2px solid #444; border-radius: 15px; width: 280px; padding: 30px 20px; text-align: center; transition: transform 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative;}
.game-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
.game-title { font-family: 'Bungee', sans-serif; font-size: 1.6rem; margin-bottom: 10px; }
.game-desc { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; }
.play-btn { padding: 10px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; color: white;}

.btn-info-rules { position: absolute; top: -15px; left: -15px; width: 40px; height: 40px; border-radius: 50%; background: #1e293b; border: 2px solid #fff; color: white; font-family: 'Bungee'; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
.btn-info-rules:hover { background: #3b82f6; transform: scale(1.1); }

.delete-btn { position: absolute; top: -15px; right: -15px; background: #ef4444; border: 2px solid #fff; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10;}
.delete-btn:hover { background: #dc2626; transform: scale(1.1); }

#game-player-container { display: none; position: fixed; inset: 0; background: #111; z-index: 500; }
#game-iframe { width: 100%; height: 100%; border: none; background: #111;}

#global-home-btn { position: fixed; top: 15px; left: 15px; width: 50px; height: 50px; border-radius: 50%; background: #ef4444; border: 2px solid #fff; color: white; font-size: 1.5rem; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; font-family: 'Bungee'; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;}
#global-home-btn:hover { background: #b91c1c; transform: scale(1.1); }

#add-game-box { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; border: 2px solid #334155; }
textarea.portal-input { height: 120px; text-align: left; resize: vertical; font-family: monospace; font-size: 0.8rem;}

input[type="file"] { padding: 10px; font-size: 0.9rem; text-align: left; cursor: pointer; }
input[type="file"]::file-selector-button { background: #3b82f6; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Bungee'; margin-right: 15px;}
.color-picker-wrap { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0 20px 0; }
input[type="color"] { -webkit-appearance: none; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; background: none; }
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
input[type="color"]::-webkit-color-swatch { border: 3px solid #fff; border-radius: 50%; }

#rules-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
.rules-box { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 450px; width: 100%; text-align: center; border: 2px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.rules-title { font-family: 'Bungee'; font-size: 1.5rem; margin-bottom: 15px; color: #fff; }
.rules-text { font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 25px; text-align: left; overflow-y: auto; max-height: 50vh;}
.rules-close { background: #ef4444; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-family: 'Bungee'; font-size: 1rem; cursor: pointer; width: 100%; }
</style>
</head>
<body>

<button id="global-home-btn" onclick="closeGame()">✖</button>

<div id="rules-modal">
    <div class="rules-box">
        <h2 id="rules-title" class="rules-title">Règles du jeu</h2>
        <div id="rules-text" class="rules-text"></div>
        <button class="rules-close" onclick="closeRules()">J'AI COMPRIS !</button>
    </div>
</div>

<div class="screen-container active" id="login-container">
    <div id="login-box">
        <h1 class="portal-title">PORTAIL</h1>
        <p style="margin-bottom: 20px; color: #94a3b8;">Identifiez-vous pour continuer</p>
        
        <input type="text" id="login-user" class="portal-input" placeholder="Identifiant">
        <input type="password" id="login-pass" class="portal-input" placeholder="Mot de passe">
        <button class="portal-btn btn-admin" onclick="tryAdminLogin()">CONNEXION ADMIN</button>
        
        <div style="margin: 25px 0; border-top: 1px solid #475569;"></div>
        
        <p style="font-size: 0.85rem; color: #94a3b8;">Accès simple sans pouvoir d'ajout :</p>
        <button class="portal-btn btn-guest" onclick="loginAsGuest()">ENTRER COMME INVITÉ</button>
    </div>
</div>

<div class="screen-container" id="hub-container">
    <h1 class="portal-title">SÉLECTIONNEZ UN JEU</h1>
    <button id="btn-show-add" class="portal-btn btn-add" style="display: none;" onclick="showAddGameScreen()">+ AJOUTER UN JEU</button>
    <div class="game-selector" id="games-grid"></div>
    <button class="portal-btn btn-cancel" style="max-width: 200px; margin-top: 30px;" onclick="logout()">DÉCONNEXION</button>
</div>

<div class="screen-container" id="add-game-container">
    <h1 class="portal-title">NOUVEAU JEU</h1>
    <div id="add-game-box">
        <label style="color:#94a3b8; font-size:0.8rem;">Titre du jeu</label>
        <input type="text" id="add-title" class="portal-input" placeholder="Ex: Spyfall">
        
        <label style="color:#94a3b8; font-size:0.8rem;">Description courte</label>
        <input type="text" id="add-desc" class="portal-input" placeholder="Ex: Trouvez l'espion.">
        
        <label style="color:#94a3b8; font-size:0.8rem;">Règles du jeu (S'affichera via le bouton "i")</label>
        <textarea id="add-rules" class="portal-input" placeholder="Expliquez brièvement comment jouer..."></textarea>

        <label style="color:#94a3b8; font-size:0.8rem;">Couleur du thème</label>
        <div class="color-picker-wrap">
            <input type="color" id="add-color" value="#3b82f6">
            <span id="color-hex-display" style="font-family: monospace;">#3b82f6</span>
        </div>
        
        <div style="margin: 20px 0; border-top: 1px dashed #475569;"></div>

        <label style="color:#94a3b8; font-size:0.8rem;">Importer le fichier HTML du jeu</label>
        <input type="file" id="add-file" accept=".html" class="portal-input" onchange="handleFileUpload(event)">
        
        <label style="color:#94a3b8; font-size:0.8rem;">OU modifiez le code manuellement :</label>
        <textarea id="add-code" class="portal-input" placeholder="Le code apparaîtra ici après importation du fichier..."></textarea>
        
        <button class="portal-btn btn-admin" style="margin-top:20px;" onclick="saveNewGame()">ENREGISTRER LE JEU</button>
        <button class="portal-btn btn-cancel" onclick="showHubScreen()">ANNULER</button>
    </div>
</div>

<div id="game-player-container">
    <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<script>

gin: 10px 0; background: #1e293b; padding: 10px 15px; border-radius: 8px; border: 1px solid #374151; } .und-card { background: #1e293b; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; margin: 20px 0; border: 2px solid #374151; } .und-player-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; } .und-player-item { background: #1e293b; border: 2px solid #374151; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; } .und-player-item.dead { opacity: 0.4; border-color: #ef4444; text-decoration: line-through; pointer-events: none; }</style></head><body><div id='undercover-container'><div class='und-screen active' id='und-scr-setup'><h1>UNDERCOVER</h1><p>Trouvez l'intrus parmi vous.</p><div id='und-setup-step-1' style='width: 100%; display: flex; flex-direction: column; align-items: center;'><button class='und-btn' onclick='und_chooseMode(\"LOCAL\")'>📱 JOUER EN LOCAL</button><button class='und-btn und-btn-secondary' onclick='und_chooseMode(\"ONLINE\")'>🌐 JOUER EN LIGNE</button></div><div id='und-setup-step-2' style='display: none; width: 100%; flex-direction: column; align-items: center;'><label style='opacity:0.7; font-size:0.8rem;'>Thème des mots</label><select class='und-input' id='und-in-theme'><option value='CLASSIC'>🍎 Classique</option><option value='MANGA'>🍥 Manga</option></select><label style='opacity:0.7; font-size:0.8rem; margin-top: 10px;'>Nombre de joueurs (3 à 10)</label><input type='number' class='und-input' id='und-in-players' value='5' min='3' max='10'><label class='und-checkbox-wrap'><input type='checkbox' id='und-in-mw'><span>Ajouter Mr. White</span></label><button class='und-btn' style='margin-top: 15px;' onclick='und_generateNameInputs()'>SUIVANT</button><button class='und-btn und-btn-secondary' onclick='und_resetSetup()'>RETOUR</button></div><div id='und-setup-step-names' style='display: none; width: 100%; flex-direction: column; align-items: center;'><label style='opacity:0.7; font-size:0.8rem; margin-bottom:10px;'>Noms des joueurs</label><div id='und-name-inputs' style='width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; overflow-y: auto; max-height: 40vh;'></div><button class='und-btn' onclick='und_initLocalGame()'>CRÉER LA PARTIE</button><button class='und-btn und-btn-secondary' onclick='und_resetSetup()'>RETOUR</button></div><div id='und-setup-step-online' style='display: none; width: 100%; flex-direction: column; align-items: center;'><button class='und-btn' onclick='und_hostGame()'>CRÉER UN SALON</button><div style='margin: 20px 0; border-top: 1px solid #374151; width: 100%;'></div><input type='text' class='und-input' id='und-in-code' placeholder='CODE SALON' maxlength='4' style='text-transform: uppercase;'><input type='text' class='und-input' id='und-in-name' placeholder='VOTRE NOM' maxlength='12'><button class='und-btn und-btn-secondary' onclick='und_joinGame()'>REJOINDRE</button><button class='und-btn' style='background:transparent; border:1px solid #475569; margin-top:20px;' onclick='und_resetSetup()'>RETOUR</button></div></div><div class='und-screen' id='und-scr-lobby'><h1>SALON <span id='und-lobby-code'></span></h1><div class='und-card' style='padding: 15px; text-align: left;'><div id='und-lobby-players' style='display: flex; flex-direction: column; gap: 8px;'></div></div><div id='und-host-settings' style='display:none; width: 100%; align-items: center; flex-direction: column;'><select class='und-input' id='und-lobby-theme' style='margin-bottom: 5px;'><option value='CLASSIC'>Thème : Classique</option><option value='MANGA'>Thème : Manga</option></select><label class='und-checkbox-wrap' style='width: 100%; max-width: 300px; justify-content: center;'><input type='checkbox' id='und-lobby-mw'><span>Jouer avec Mr. White</span></label><button class='und-btn' onclick='und_startOnlineGame()'>LANCER LA PARTIE</button></div></div><div class='und-screen' id='und-scr-roles'><h1 let portalState = { currentUser: null, games: [] };

const defaultUndercoverGame = { 
    id: 'undercover_default', 
    title: 'UNDERCOVER', 
    desc: "Trouvez l'intrus parmi vous en débattant sur un mot secret.", 
    rules: "Chacun reçoit un mot secret. Les Civils ont tous le même mot. Un joueur a un mot similaire (Undercover) et un autre n'a pas de mot du tout (Mr White). Débattez tour à tour pour éliminer les intrus !",
    color: '#3b82f6', 
    code: undercoverRawCode 
};

window.onload = () => { 
    switchScreen('login-container'); 
    
    // Ecoute Firebase en temps réel pour synchroniser les jeux
    if(db) {
        db.ref('portal_games_list').on('value', (snapshot) => {
            if(snapshot.exists()) {
                portalState.games = snapshot.val();
            } else {
                portalState.games = [defaultUndercoverGame];
                db.ref('portal_games_list').set(portalState.games);
            }
            if(document.getElementById('hub-container').classList.contains('active')) {
                renderGamesGrid();
            }
        });
    } else {
        const savedGames = localStorage.getItem('my_portal_games');
        portalState.games = savedGames ? JSON.parse(savedGames) : [defaultUndercoverGame];
    }
};

document.getElementById('add-color').addEventListener('input', function(e) {
    document.getElementById('color-hex-display').innerText = e.target.value;
});

function switchScreen(id) {
    document.querySelectorAll('.screen-container').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* CONNEXION */
function tryAdminLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if(u === 'nassim' && p === 'nassim') { 
        portalState.currentUser = 'admin'; 
        showHubScreen(); 
    } 
    else { alert("Identifiant ou mot de passe incorrect !"); }
}

function loginAsGuest() { portalState.currentUser = 'guest'; showHubScreen(); }
function logout() { portalState.currentUser = null; document.getElementById('login-user').value = ''; document.getElementById('login-pass').value = ''; switchScreen('login-container'); }

/* HUB */
function showHubScreen() {
    switchScreen('hub-container');
    document.getElementById('btn-show-add').style.display = portalState.currentUser === 'admin' ? 'block' : 'none';
    renderGamesGrid();
}

function renderGamesGrid() {
    const grid = document.getElementById('games-grid');
    grid.innerHTML = '';
    
    portalState.games.forEach((game, index) => {
        let card = document.createElement('div');
        card.className = 'game-card';
        card.style.borderColor = game.color;
        
        let deleteBtnHtml = portalState.currentUser === 'admin' ? `<button class="delete-btn" onclick="deleteGame(${index}, event)">🗑️</button>` : '';
        
        card.innerHTML = `
            ${deleteBtnHtml}
            <button class="btn-info-rules" onclick="openGameRules(${index}, event)">i</button>
            <div>
                <div class="game-title" style="color: ${game.color};">${game.title}</div>
                <div class="game-desc">${game.desc}</div>
            </div>
            <button class="play-btn" style="background: ${game.color};" onclick="launchGame(${index})">JOUER</button>
        `;
        grid.appendChild(card);
    });
}

function openGameRules(index, event) {
    event.stopPropagation();
    const game = portalState.games[index];
    document.getElementById('rules-text').innerHTML = game.rules || "Aucune règle définie pour ce jeu.";
    document.getElementById('rules-modal').style.display = 'flex';
}

function closeRules() {
    document.getElementById('rules-modal').style.display = 'none';
}

function deleteGame(index, event) {
    event.stopPropagation();
    if(confirm("Êtes-vous sûr de vouloir supprimer ce jeu ?")) {
        portalState.games.splice(index, 1);
        if(db) db.ref('portal_games_list').set(portalState.games);
        else localStorage.setItem('my_portal_games', JSON.stringify(portalState.games));
        renderGamesGrid();
    }
}

/* AJOUT DE JEU */
function showAddGameScreen() {
    document.getElementById('add-title').value = ''; document.getElementById('add-desc').value = '';
    document.getElementById('add-rules').value = ''; document.getElementById('add-color').value = '#3b82f6'; 
    document.getElementById('color-hex-display').innerText = '#3b82f6';
    document.getElementById('add-code').value = ''; document.getElementById('add-file').value = '';
    switchScreen('add-game-container');
}

function handleFileUpload(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) { document.getElementById('add-code').value = e.target.result; };
    reader.onerror = function() { alert("Erreur lors de la lecture du fichier."); };
    reader.readAsText(file);
}

function saveNewGame() {
    const title = document.getElementById('add-title').value.trim(); 
    const desc = document.getElementById('add-desc').value.trim();
    const rules = document.getElementById('add-rules').value.trim(); 
    const color = document.getElementById('add-color').value.trim(); 
    const code = document.getElementById('add-code').value.trim();
    
    if(!title || !code) return alert("Le titre et le code HTML sont obligatoires.");

    portalState.games.push({ 
        id: 'game_' + Math.random().toString(36).substr(2, 9), 
        title: title, desc: desc, rules: rules, color: color, code: code 
    });
    
    if(db) db.ref('portal_games_list').set(portalState.games);
    else localStorage.setItem('my_portal_games', JSON.stringify(portalState.games));
    
    alert("Jeu ajouté avec succès !"); 
    showHubScreen();
}

/* LECTEUR IFRAME */
function launchGame(index) {
    const game = portalState.games[index];
    document.querySelectorAll('.screen-container').forEach(s => s.classList.remove('active'));
    document.getElementById('game-player-container').style.display = 'block';
    document.getElementById('global-home-btn').style.display = 'flex';
    document.getElementById('game-iframe').srcdoc = game.code;
}

function closeGame() {
    if(confirm("Quitter ce jeu et retourner au menu ?")) {
        document.getElementById('game-player-container').style.display = 'none';
        document.getElementById('global-home-btn').style.display = 'none';
        document.getElementById('game-iframe').srcdoc = '';
        showHubScreen();
    }
}
</script>
